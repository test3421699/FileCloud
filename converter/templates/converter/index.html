<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File to Link Converter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #f9f9fb; color: #333; }
        .card { padding: 30px; border: 2px dashed #cbd5e1; border-radius: 12px; background: #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; }
        .btn { background: #2563eb; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .btn:hover { background: #1d4ed8; }
        .result-box { margin-top: 25px; padding: 15px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; color: #166534; word-break: break-all; text-align: left; }
        a { color: #2563eb; font-weight: 500; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h2 style="text-align: center; margin-bottom: 20px;">File to Link Converter</h2>
    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="myfile" required><br>
            <button type="submit" class="btn">Generate Shareable Link</button>
        </form>
        
        {% if link %}
            <div class="result-box">
                <strong>Link successfully generated:</strong><br><br>
                <a href="{{ link }}" target="_blank">{{ link }}</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
